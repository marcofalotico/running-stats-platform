<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Running Report • Sintesi tecnica</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root {
  --bg: #08101f;
  --panel: #0f1930;
  --panel-2: #121f3f;
  --line: rgba(122, 146, 199, 0.18);
  --text: #ebf1ff;
  --muted: #9eadd1;
  --accent: #ff7a00;
  --accent-2: #4ea6ff;
  --good: #32c48d;
  --warn: #ffb020;
  --bad: #ff5d5d;
  --shadow: 0 18px 50px rgba(0,0,0,.24);
  --radius: 20px;
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background:
    radial-gradient(circle at top right, rgba(78,166,255,.12), transparent 24%),
    radial-gradient(circle at top left, rgba(255,122,0,.08), transparent 20%),
    var(--bg);
}
.app-shell { min-height: 100vh; overflow-x: clip; }
.row > * { min-width: 0; }
.card-panel {
  width: 100%;
  min-width: 0;
  overflow: hidden;
  background: linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.018));
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.sidebar-wrap { width: 100%; min-width: 0; }
.sticky-lg-top { top: 1.2rem; }
.eyebrow {
  color: var(--accent);
  font-size: .76rem;
  font-weight: 800;
  letter-spacing: .14em;
  text-transform: uppercase;
}
.muted { color: var(--muted); }
.btn-soft {
  border-radius: 14px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.03);
  color: var(--text);
}
.btn-soft:hover { background: rgba(255,255,255,.06); color: var(--text); }
.btn-accent {
  background: rgba(255,122,0,.14);
  border-color: rgba(255,122,0,.28);
  color: #ffe7d2;
}
.btn-accent:hover { background: rgba(255,122,0,.20); color: #fff; }
.hero-card { padding: 1.4rem; }
.section-title {
  font-size: clamp(1.45rem, 2vw, 2rem);
  font-weight: 800;
}
.delta-badge {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  padding: .28rem .62rem;
  border-radius: 999px;
  font-size: .76rem;
  font-weight: 700;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.035);
  white-space: normal;
  max-width: 100%;
  text-align: left;
}
.mini-note {
  font-size: .93rem;
  line-height: 1.55;
  color: var(--muted);
}
.metric-item {
  min-width: 0;
  padding: .9rem 1rem;
  border-radius: 16px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.025);
}
.metric-item .label { color: var(--muted); font-size: .78rem; text-transform: uppercase; letter-spacing: .08em; }
.metric-item .value { font-size: 1.45rem; font-weight: 800; margin-top: .35rem; }
.list-clean { margin: 0; padding-left: 1.15rem; }
.list-clean li { color: var(--muted); line-height: 1.7; margin-bottom: .35rem; }
.list-clean strong { color: var(--text); }
svg.chart {
  width: 100%;
  max-width: 100%;
  height: 280px;
  display: block;
  border-radius: 16px;
  background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0));
}
.chart-card { min-width: 0; padding: 1rem; height: 100%; }
.chart-card h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: .25rem; }
.chart-sub { color: var(--muted); font-size: .9rem; line-height: 1.5; margin-bottom: .75rem; }
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: .4rem;
}
.calendar .wd {
  text-align: center;
  font-size: .72rem;
  color: var(--muted);
  padding: .2rem 0;
  text-transform: uppercase;
}
.calendar .day {
  min-height: 48px;
  border-radius: 14px;
  border: 1px solid transparent;
  background: rgba(255,255,255,.025);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.calendar .day.has-report::after {
  content: '';
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  position: absolute;
  bottom: 7px;
  left: 50%;
  transform: translateX(-50%);
}
.calendar .day.selected {
  border-color: rgba(78,166,255,.55);
  box-shadow: inset 0 0 0 1px rgba(78,166,255,.28);
}
.calendar .day.other { opacity: .32; }
.table-tight td, .table-tight th {
  padding: .7rem .6rem;
  border-color: rgba(255,255,255,.06);
}
.table-tight th {
  color: var(--muted);
  font-size: .74rem;
  text-transform: uppercase;
  letter-spacing: .08em;
}
.small-note { color: var(--muted); font-size: .85rem; line-height: 1.55; }
.hero-card, .calendar, .mini-note, .muted, .chart-sub, .section-title, .metric-item .value { min-width: 0; overflow-wrap: anywhere; }
.table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.btn-hamburger {
  padding: .5rem .65rem;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.03);
}
.btn-hamburger:hover { background: rgba(255,255,255,.06); }
.btn-hamburger .navbar-toggler-icon {
  display: block;
  width: 1.35em;
  height: 1.35em;
  background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28235, 241, 255, 0.88%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
}
.loading-box, .error-box {
  padding: 1.5rem;
}
.error-box { color: #ffd9d9; }
@media (max-width: 991.98px) {
  .sidebar-wrap { position: static !important; }
}
@media (max-width: 767.98px) {
  .hero-card, .chart-card, .metric-item { padding-left: .9rem; padding-right: .9rem; }
  .card-panel { border-radius: 18px; }
  svg.chart { height: 240px; }
}
</style>
</head>
<body>
<div class="app-shell py-3 py-lg-4">
  <div class="container-xxl">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <div class="eyebrow">Relazione tecnica sintetica</div>
        <div class="h2 fw-bold mb-0">Running report archive</div>
      </div>
      <div class="d-lg-none">
        <button class="navbar-toggler btn-hamburger" type="button" data-bs-toggle="offcanvas" data-bs-target="#archiveCanvas" aria-controls="archiveCanvas" aria-label="Apri archivio">
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>
    </div>
    <div class="row g-4">
      <aside class="col-lg-4 col-xxl-3 d-none d-lg-block"><div class="sidebar-wrap sticky-lg-top"><div id="sidebarDesktop"></div></div></aside>
      <main class="col-lg-8 col-xxl-9"><div id="mainContent"></div></main>
    </div>
  </div>
</div>

<div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="archiveCanvas" aria-labelledby="archiveCanvasLabel" style="background: var(--bg); width:min(92vw, 380px);">
  <div class="offcanvas-header border-bottom" style="border-color: var(--line)!important;">
    <h5 class="offcanvas-title" id="archiveCanvasLabel">Archivio report</h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body p-3"><div id="sidebarMobile"></div></div>
</div>

<script>
const ARCHIVE_URL = './report-archive.json';

const state = {
  archive: null,
  selectedDate: null,
  monthCursor: null,
  loading: true,
  error: null
};

function getReportDates() {
  return state.archive ? Object.keys(state.archive.reports).sort() : [];
}

function isoToDate(iso) {
  const [y, m, d] = iso.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function formatMonth(date) {
  return date.toLocaleDateString('it-IT', { month: 'long', year: 'numeric' });
}

function fmtPace(sec) {
  if (sec == null || Number.isNaN(sec)) return 'n.d.';
  const m = Math.floor(sec / 60);
  const s = Math.round(sec % 60).toString().padStart(2, '0');
  return `${m}:${s}/km`;
}

function readSelectedDateFromHash() {
  const match = window.location.hash.match(/date=(\d{4}-\d{2}-\d{2})/);
  return match ? match[1] : null;
}

function writeSelectedDateToHash(iso) {
  const url = `${window.location.pathname}${window.location.search}#date=${iso}`;
  history.replaceState(null, '', url);
}

async function loadArchive() {
  const res = await fetch(ARCHIVE_URL, { cache: 'no-store' });
  if (!res.ok) throw new Error(`Impossibile caricare ${ARCHIVE_URL} (${res.status})`);
  const parsed = await res.json();
  if (!parsed || !parsed.reports) throw new Error('Formato JSON non valido: manca la chiave "reports".');
  return parsed;
}

function ensureSelectedDateValid() {
  const dates = getReportDates();
  if (!dates.length) return;
  if (!state.selectedDate || !state.archive.reports[state.selectedDate]) {
    state.selectedDate = dates[dates.length - 1];
  }
  writeSelectedDateToHash(state.selectedDate);
  const selected = isoToDate(state.selectedDate);
  state.monthCursor = new Date(selected.getFullYear(), selected.getMonth(), 1);
}

function latestSession(report) {
  const sessions = report?.data?.sessions || [];
  return sessions.length ? sessions[sessions.length - 1] : null;
}

function latestVo2(report) {
  const statusVo2 = report?.data?.trainingStatus?.vo2max;
  if (statusVo2 != null) return statusVo2;
  const trend = report?.data?.vo2Trend || [];
  return trend.length ? trend[trend.length - 1].value : null;
}

function latestReadiness(report) {
  return report?.data?.trainingReadiness?.value ?? null;
}

function latestWeight(report) {
  return report?.data?.bodyComp?.weight ?? null;
}

function latestBodyFat(report) {
  return report?.data?.bodyComp?.bodyFat ?? null;
}

function createSVG(el, width = 900, height = 280) {
  el.setAttribute('viewBox', `0 0 ${width} ${height}`);
  el.innerHTML = '';
  return { width, height };
}

function lineChart(svgId, data, valueAccessor, opts = {}) {
  const svg = document.getElementById(svgId);
  if (!svg || !data?.length) return;
  const { width, height } = createSVG(svg, opts.width || 900, opts.height || 280);
  const m = { top: 18, right: 18, bottom: 44, left: 54 };
  const innerW = width - m.left - m.right;
  const innerH = height - m.top - m.bottom;
  const values = data.map(valueAccessor).filter(v => v != null);
  if (!values.length) return;

  let minY = Math.min(...values);
  let maxY = Math.max(...values);
  const pad = (maxY - minY) * 0.15 || 1;
  const y0 = minY - pad;
  const y1 = maxY + pad;

  const x = i => m.left + (i / Math.max(data.length - 1, 1)) * innerW;
  const y = v => m.top + innerH - ((v - y0) / (y1 - y0)) * innerH;

  for (let i = 0; i < 5; i++) {
    const gy = m.top + (innerH / 4) * i;
    const val = y1 - ((y1 - y0) / 4) * i;
    svg.insertAdjacentHTML('beforeend', `<line x1="${m.left}" y1="${gy}" x2="${width - m.right}" y2="${gy}" stroke="rgba(255,255,255,.08)" />`);
    svg.insertAdjacentHTML('beforeend', `<text x="${m.left - 10}" y="${gy + 4}" text-anchor="end" fill="rgba(235,241,255,.62)" font-size="12">${opts.formatY ? opts.formatY(val) : Math.round(val)}</text>`);
  }

  data.forEach((d, i) => {
    if (i % Math.max(1, Math.ceil(data.length / 6)) === 0 || i === data.length - 1) {
      svg.insertAdjacentHTML('beforeend', `<text x="${x(i)}" y="${height - 14}" text-anchor="middle" fill="rgba(235,241,255,.62)" font-size="12">${d.label || d.date}</text>`);
    }
  });

  let path = '';
  data.forEach((d, i) => {
    const v = valueAccessor(d);
    if (v == null) return;
    path += `${path ? 'L' : 'M'} ${x(i)} ${y(v)} `;
  });

  svg.insertAdjacentHTML('beforeend', `<path d="${path}" fill="none" stroke="${opts.color || '#ff7a00'}" stroke-width="3.25" />`);
  data.forEach((d, i) => {
    const v = valueAccessor(d);
    if (v == null) return;
    svg.insertAdjacentHTML('beforeend', `<circle cx="${x(i)}" cy="${y(v)}" r="4.5" fill="${opts.color || '#ff7a00'}" />`);
  });
}

function barChart(svgId, data, valueKey, opts = {}) {
  const svg = document.getElementById(svgId);
  if (!svg || !data?.length) return;
  const { width, height } = createSVG(svg, opts.width || 900, opts.height || 280);
  const m = { top: 18, right: 18, bottom: 48, left: 48 };
  const innerW = width - m.left - m.right;
  const innerH = height - m.top - m.bottom;
  const maxVal = Math.max(...data.map(d => d[valueKey] || 0)) * 1.2 || 1;
  const step = innerW / data.length;
  const barW = step * 0.58;

  for (let i = 0; i < 5; i++) {
    const val = (maxVal / 4) * (4 - i);
    const gy = m.top + (innerH / 4) * i;
    svg.insertAdjacentHTML('beforeend', `<line x1="${m.left}" y1="${gy}" x2="${width - m.right}" y2="${gy}" stroke="rgba(255,255,255,.08)" />`);
    svg.insertAdjacentHTML('beforeend', `<text x="${m.left - 10}" y="${gy + 4}" text-anchor="end" fill="rgba(235,241,255,.62)" font-size="12">${Math.round(val)}</text>`);
  }

  data.forEach((d, i) => {
    const x = m.left + (i + 0.5) * step - barW / 2;
    const h = ((d[valueKey] || 0) / maxVal) * innerH;
    const y = m.top + innerH - h;
    svg.insertAdjacentHTML('beforeend', `<rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="8" fill="${opts.color || '#4ea6ff'}" />`);
    svg.insertAdjacentHTML('beforeend', `<text x="${x + barW / 2}" y="${height - 14}" text-anchor="middle" fill="rgba(235,241,255,.62)" font-size="12">${d.label}</text>`);
  });
}

function parseSessionDateLabel(label, fallbackYear = 2026) {
  if (!label) return null;
  const m = String(label).toLowerCase().match(/(\d{1,2})\s+([a-zà]+)/i);
  if (!m) return null;
  const months = { gen:0, feb:1, mar:2, apr:3, mag:4, giu:5, lug:6, ago:7, set:8, ott:9, nov:10, dic:11 };
  const monthKey = m[2].slice(0,3);
  if (!(monthKey in months)) return null;
  return new Date(fallbackYear, months[monthKey], Number(m[1]));
}

function sessionKey(s) {
  return [s?.name || '', s?.date || '', s?.distance || '', s?.pace || ''].join('|');
}

function inferSessionCategory(session) {
  const name = String(session?.name || '').toLowerCase();
  const type = String(session?.type || '').toLowerCase();
  if (type === 'intervals' || type === 'tempo' || name.includes('ripet') || name.includes('passo gara')) return 'intervals';
  if (type === 'progression' || name.includes('progress')) return 'progression';
  if (name.includes('gara') || name.includes('test') || name.includes('riferimento') || type === 'fast' || type === 'race') return 'race';
  if (name.includes('lung') || name.includes('long')) return 'long';
  if (type === 'easy' || name.includes('facile')) return 'easy';
  return type || 'other';
}

function collectAllSessions(cutoffIso = state.selectedDate) {
  const seen = new Set();
  const out = [];
  const cutoff = cutoffIso ? isoToDate(cutoffIso) : null;
  if (cutoff) cutoff.setHours(23, 59, 59, 999);

  getReportDates().forEach(reportIso => {
    if (cutoff && isoToDate(reportIso) > cutoff) return;
    const rep = state.archive.reports[reportIso];
    (rep?.data?.sessions || []).forEach(s => {
      const key = sessionKey(s);
      if (seen.has(key)) return;
      seen.add(key);
      const parsed = parseSessionDateLabel(s.date, isoToDate(reportIso).getFullYear()) || isoToDate(reportIso);
      if (cutoff && parsed > cutoff) return;
      out.push({ ...s, _parsedDate: parsed, _reportIso: reportIso, _category: inferSessionCategory(s) });
    });
  });

  return out.sort((a, b) => a._parsedDate - b._parsedDate);
}

function timeStrToSeconds(value) {
  if (!value) return null;
  const parts = String(value).split(':').map(Number);
  if (parts.some(Number.isNaN)) return null;
  if (parts.length === 2) return parts[0] * 60 + parts[1];
  if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
  return null;
}

function inferFallbackCompareGroup(session) {
  const type = inferSessionCategory(session);
  const snap = session?.comparisonSnapshot || {};
  const distance = Number(snap.distance ?? session.distance ?? 0);
  const durationMin = (timeStrToSeconds(snap.time ?? session.time) ?? 0) / 60;
  const name = String(session?.name || '').toLowerCase();

  if (type === 'race') {
    if (distance >= 9.5 && distance <= 10.5) return { key: 'race_10k', label: 'Gare / test 10K', family: 'race' };
    if (distance >= 4.7 && distance <= 5.3) return { key: 'race_5k', label: 'Gare / test 5K', family: 'race' };
  }

  if (type === 'easy') {
    if (distance >= 7 && distance <= 10.5) return { key: 'easy_7_10k', label: 'Corse facili 7–10 km', family: 'easy' };
    if (distance >= 3 && distance < 5.5) return { key: 'easy_3_5k', label: 'Corse facili 3–5 km', family: 'easy' };
  }

  if (type === 'progression') {
    if (durationMin >= 28 && durationMin <= 32) return { key: 'prog_28_32', label: 'Progressioni 28–32 min', family: 'progression' };
    if (durationMin >= 30 && durationMin <= 36) return { key: 'prog_30_36', label: 'Progressioni 30–36 min', family: 'progression' };
    if (durationMin > 36 && durationMin <= 45) return { key: 'prog_36_45', label: 'Progressioni 36–45 min', family: 'progression' };
  }

  if (type === 'intervals') {
    if (name.includes('2×8') || name.includes('2x8')) return { key: 'int_2x8', label: 'Richiami passo gara 2×8′', family: 'intervals' };
    if (name.includes('falcato')) return { key: 'int_falcato', label: 'Ripetute di passo falcato', family: 'intervals' };
  }

  return { key: `${type || 'other'}_generic`, label: 'Sedute comparabili', family: type || 'other' };
}

function getComparisonView(session) {
  const fallback = inferFallbackCompareGroup(session);
  const snap = session?.comparisonSnapshot || {};
  return {
    ...session,
    _compareKey: session.compareGroup || fallback.key,
    _compareLabel: session.compareLabel || fallback.label,
    _compareFamily: session.compareFamily || fallback.family,
    _compareBasis: snap.basis || 'mixed',
    _compareDistance: snap.distance ?? session.distance ?? null,
    _compareTime: snap.time ?? session.time ?? null,
    _comparePace: snap.pace ?? session.pace ?? null,
    _comparePaceSec: snap.paceSec ?? session.paceSec ?? null,
    _compareAvgHr: snap.avgHr ?? session.avgHr ?? null,
    _compareMaxHr: snap.maxHr ?? session.maxHr ?? null,
    _compareName: snap.label ? `${session.name} • ${snap.label}` : session.name
  };
}

function buildComparableGroups(cutoffIso = state.selectedDate) {
  const groups = new Map();
  collectAllSessions(cutoffIso).forEach(session => {
    const s = getComparisonView(session);
    if (!groups.has(s._compareKey)) {
      groups.set(s._compareKey, {
        key: s._compareKey,
        label: s._compareLabel,
        family: s._compareFamily,
        basis: s._compareBasis,
        sessions: []
      });
    }
    groups.get(s._compareKey).sessions.push(s);
  });

  return Array.from(groups.values())
    .map(g => ({ ...g, sessions: g.sessions.sort((a, b) => a._parsedDate - b._parsedDate) }))
    .sort((a, b) => a.label.localeCompare(b.label, 'it'));
}

function pickBestComparableGroup(family) {
  return buildComparableGroups(state.selectedDate)
    .filter(g => g.family === family && g.sessions.length >= 2)
    .sort((a, b) => b.sessions.length - a.sessions.length)[0] || null;
}

function groupToSeries(group) {
  if (!group) return [];
  return group.sessions.map(s => ({
    label: s._parsedDate.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' }),
    paceSec: s._comparePaceSec,
    avgHr: s._compareAvgHr,
    distance: s._compareDistance,
    name: s._compareName
  }));
}

function buildArchiveWeightSeries(cutoffIso = state.selectedDate) {
  const cutoff = cutoffIso ? isoToDate(cutoffIso) : null;
  if (cutoff) cutoff.setHours(23, 59, 59, 999);

  return getReportDates()
    .filter(date => !cutoff || isoToDate(date) <= cutoff)
    .map(date => ({
      label: isoToDate(date).toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' }),
      date,
      weight: latestWeight(state.archive.reports[date]),
      bodyFat: latestBodyFat(state.archive.reports[date]),
      readiness: latestReadiness(state.archive.reports[date]),
      vo2: latestVo2(state.archive.reports[date])
    }))
    .filter(d => d.weight != null);
}

function collectSundayLongSeries(report) {
  return (report?.data?.easyRuns || [])
    .map(r => ({ ...r, _date: isoToDate(r.date) }))
    .filter(r => r._date.getDay() === 0)
    .sort((a, b) => a._date - b._date)
    .map(r => ({ ...r, label: r._date.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' }) }));
}

function buildCalendarMarkup() {
  const reportDates = new Set(getReportDates());
  const first = new Date(state.monthCursor.getFullYear(), state.monthCursor.getMonth(), 1);
  const startOffset = (first.getDay() + 6) % 7;
  const gridStart = new Date(first);
  gridStart.setDate(first.getDate() - startOffset);

  let cells = '';
  const weekdays = ['Lun', 'Mar', 'Mer', 'Gio', 'Ven', 'Sab', 'Dom'].map(d => `<div class="wd">${d}</div>`).join('');

  for (let i = 0; i < 42; i++) {
    const d = new Date(gridStart);
    d.setDate(gridStart.getDate() + i);
    const iso = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    const sameMonth = d.getMonth() === state.monthCursor.getMonth();
    const hasReport = reportDates.has(iso);
    const selected = iso === state.selectedDate;
    cells += `<button type="button" class="day ${sameMonth ? '' : 'other'} ${hasReport ? 'has-report' : ''} ${selected ? 'selected' : ''}" data-date="${iso}">${d.getDate()}</button>`;
  }

  return `<div class="d-flex align-items-center justify-content-between mb-3">
      <button class="btn btn-soft btn-sm" id="prevMonthBtn">‹</button>
      <div class="fw-semibold text-capitalize">${formatMonth(state.monthCursor)}</div>
      <button class="btn btn-soft btn-sm" id="nextMonthBtn">›</button>
    </div>
    <div class="calendar">${weekdays}${cells}</div>`;
}

function exportArchive() {
  const blob = new Blob([JSON.stringify(state.archive, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'report-archive.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

function renderSidebar(targetId) {
  const root = document.getElementById(targetId);
  if (!root || !state.archive) return;

  root.innerHTML = `<section class="card-panel p-3 mb-3">
      <div class="eyebrow mb-2">Archivio report</div>
      <div class="fw-semibold mb-2">Sorgente unica remota</div>
      <p class="small-note mb-3">
        L’interfaccia legge un solo file JSON remoto, mantenendo tutti i report storici consultabili dal calendario.
        Nessun import manuale o localStorage operativo nel flusso standard.
      </p>
      <div class="d-grid">
        <button id="${targetId}-export" class="btn btn-soft btn-accent">Esporta JSON corrente</button>
      </div>
    </section>
    <section class="card-panel p-3">${buildCalendarMarkup()}</section>`;

  root.querySelector(`#${targetId}-export`).addEventListener('click', exportArchive);

  root.querySelectorAll('[data-date]').forEach(btn => btn.addEventListener('click', () => {
    state.selectedDate = btn.dataset.date;
    writeSelectedDateToHash(state.selectedDate);
    state.monthCursor = new Date(isoToDate(state.selectedDate).getFullYear(), isoToDate(state.selectedDate).getMonth(), 1);
    renderAll();
  }));

  root.querySelector('#prevMonthBtn').addEventListener('click', () => {
    state.monthCursor = new Date(state.monthCursor.getFullYear(), state.monthCursor.getMonth() - 1, 1);
    renderSidebar(targetId);
  });

  root.querySelector('#nextMonthBtn').addEventListener('click', () => {
    state.monthCursor = new Date(state.monthCursor.getFullYear(), state.monthCursor.getMonth() + 1, 1);
    renderSidebar(targetId);
  });
}

function basisLabel(basis) {
  if (basis === 'distance') return 'stessa distanza netta';
  if (basis === 'time') return 'stesso blocco temporale';
  if (basis === 'structure') return 'stessa struttura seduta';
  return 'criterio misto / fallback';
}

function buildAxisNote(group, yLabel, fallbackLabel) {
  if (!group) return `Ascissa: data delle sedute disponibili. Ordinata: ${yLabel}. ${fallbackLabel}`;
  return `Ascissa: data delle sedute del gruppo “${group.label}”. Ordinata: ${yLabel}. Confronto normalizzato su ${basisLabel(group.basis)}.`;
}

function renderChartOrNote(svgId, series, type, opts = {}) {
  const svg = document.getElementById(svgId);
  if (!svg) return;
  if (!series || series.length < 2) {
    svg.outerHTML = `<div class="small-note pt-2">Dati ancora insufficienti per un confronto serio e normalizzato di questa tipologia.</div>`;
    return;
  }
  if (type === 'bar') barChart(svgId, series, opts.valueKey, opts);
  else lineChart(svgId, series, opts.valueAccessor, opts);
}

function buildLastWorkoutOverview(report) {
  if (report?.ui?.lastWorkoutHtml) return report.ui.lastWorkoutHtml;
  const latest = latestSession(report);
  if (!latest) return `<p class="muted mb-0">Per questa data non è presente una seduta campione descrivibile nel report.</p>`;
  const view = getComparisonView(latest);
  return `<p class="muted mb-3">L’ultima attività registrata è <strong>${latest.name}</strong>: <strong>${latest.distance.toFixed(2)} km</strong> in <strong>${latest.pace}</strong> con FC media <strong>${latest.avgHr} bpm</strong>.</p>
  <p class="mini-note mb-0">Questa seduta viene letta dentro il gruppo comparabile <strong>${view._compareLabel}</strong>, con normalizzazione su <strong>${basisLabel(view._compareBasis)}</strong>.</p>`;
}

function buildStateFormText(report) {
  if (report?.ui?.stateFormHtml) return report.ui.stateFormHtml;
  const vo2 = latestVo2(report);
  const readiness = report?.data?.trainingReadiness;
  const hrv = readiness?.hrvMs ?? report?.data?.trainingStatus?.hrvMs;
  const acute = readiness?.acuteLoad;
  return `Quadro complessivamente favorevole: VO₂max <strong>${vo2 ?? 'n.d.'}</strong>${hrv != null ? `, HRV <strong>${hrv} ms</strong>` : ''}${acute != null ? `, carico acuto <strong>${acute}</strong>` : ''}.`;
}

function buildRaceForecastText(report) {
  if (report?.ui?.raceForecastHtml) return report.ui.raceForecastHtml;
  const goals = report?.data?.raceGoals || {};
  const deejay = goals?.deejayTen?.realistic || 'n.d.';
  const tuttadritta = goals?.tuttadritta?.realistic || 'n.d.';
  return `Deejay Ten: <strong>${deejay}</strong>. Tuttadritta: <strong>${tuttadritta}</strong>.`;
}

function buildBodyCompText(report) {
  if (report?.ui?.bodyCompHtml) return report.ui.bodyCompHtml;
  const body = report?.data?.bodyComp || {};
  return `Peso <strong>${body.weight ?? 'n.d.'} kg</strong>, body fat <strong>${body.bodyFat ?? 'n.d.'}%</strong>, massa muscolare <strong>${body.muscleMass ?? 'n.d.'} kg</strong>.`;
}

function buildTechnicalSummaryHTML(report) {
  if (report?.ui?.technicalSummaryHtml) return report.ui.technicalSummaryHtml;
  return `<p class="muted">Nessuna sintesi tecnica personalizzata disponibile per questo report.</p>`;
}

function renderSwaps(swaps) {
  if (!swaps || !swaps.length) return '';
  return `<div class="small-note mt-2"><strong>Sostituzioni:</strong> ${swaps.join(' • ')}</div>`;
}

function getNutritionPlan(report) {
  return report?.nutritionPlan || null;
}

function buildNutritionHTML(report) {
  const plan = getNutritionPlan(report);
  if (!plan) {
    return `<div class="card-panel p-4 h-100"><div class="eyebrow mb-2">Nutrizione</div><h2 class="section-title mb-3">Dati non disponibili</h2><p class="muted mb-0">Per questo report non è presente un piano nutrizionale a 3 giorni.</p></div>`;
  }

  return `<div class="card-panel p-4 h-100">
    <div class="eyebrow mb-2">Nutrizione</div>
    <h2 class="section-title mb-3">Solo i 3 giorni successivi al report</h2>
    <p class="muted mb-3">
      Piano sintetico su <strong>3 giorni</strong>, con variazione reale delle colazioni e protezione energetica maggiore nei giorni qualitativi.
      L’obiettivo resta ridurre massa grassa entro fine giugno senza compromettere la qualità del lavoro.
    </p>
    <div class="d-flex flex-wrap gap-2 mb-3">
      <span class="delta-badge">Target medio ~${plan.avgTargetKcal} kcal</span>
      <span class="delta-badge">Proteine ${plan.proteinLow}–${plan.proteinHigh} g</span>
      <span class="delta-badge">${plan.badgeLabel || 'Colazioni variate'}</span>
    </div>
    <div class="row g-3">
      ${plan.days.map(day => `
        <div class="col-md-6 col-xl-4">
          <div class="metric-item h-100">
            <div class="label">${day.label}</div>
            ${day.plannedLabel ? `<div class="small-note mt-1">Allenamento previsto: <strong>${day.plannedLabel}</strong></div>` : ''}
            <div class="value">${day.kcal} kcal</div>
            <div class="mini-note mt-2"><strong>${day.typeLabel}</strong></div>

            <div class="mini-note mt-3"><strong>Colazione:</strong> ${day.breakfast.text} <em>(~${day.breakfast.kcal} kcal)</em></div>
            ${renderSwaps(day.breakfast.swaps)}

            <div class="mini-note mt-3"><strong>Pranzo:</strong> ${day.lunch.text} <em>(~${day.lunch.kcal} kcal)</em></div>
            ${renderSwaps(day.lunch.swaps)}

            <div class="mini-note mt-3"><strong>Cena:</strong> ${day.dinner.text} <em>(~${day.dinner.kcal} kcal)</em></div>
            ${renderSwaps(day.dinner.swaps)}

            <div class="mini-note mt-3"><strong>Spuntino:</strong> ${day.snack.text} <em>(~${day.snack.kcal} kcal)</em></div>
            ${renderSwaps(day.snack.swaps)}

            <div class="small-note mt-3">${day.note}</div>
          </div>
        </div>
      `).join('')}
    </div>
    <p class="small-note mt-3 mb-2">${plan.footerNote1 || ''}</p>
    <p class="small-note mb-0">${plan.footerNote2 || ''}</p>
  </div>`;
}

function formatCompareCell(item, mode) {
  if (!item) return 'n.d.';
  if (mode === 'pace') return item._comparePace || item.pace || 'n.d.';
  if (mode === 'hr') return item._compareAvgHr != null ? `${item._compareAvgHr} bpm` : (item.avgHr != null ? `${item.avgHr} bpm` : 'n.d.');
  if (mode === 'date') return item.date || item.label || 'n.d.';
  return 'n.d.';
}

function buildComparisonRows() {
  const groups = buildComparableGroups(state.selectedDate).filter(g => g.sessions.length >= 2);
  if (!groups.length) {
    return `<tr><td colspan="7" class="small-note">Storico ancora insufficiente per confronti normalizzati robusti.</td></tr>`;
  }

  return groups.map(group => {
    const first = group.sessions[0];
    const last = group.sessions[group.sessions.length - 1];
    return `<tr>
      <td><strong>${group.label}</strong></td>
      <td>${basisLabel(group.basis)}</td>
      <td>${formatCompareCell(first, 'date')}</td>
      <td>${formatCompareCell(first, 'pace')}</td>
      <td>${formatCompareCell(first, 'hr')}</td>
      <td>${formatCompareCell(last, 'date')}</td>
      <td>${formatCompareCell(last, 'pace')}</td>
      <td>${formatCompareCell(last, 'hr')}</td>
    </tr>`;
  }).join('');
}

function buildComparisonComment() {
  const groups = buildComparableGroups(state.selectedDate).filter(g => g.sessions.length >= 2);
  if (!groups.length) {
    return 'Il confronto rapido usa solo gruppi omogenei. In questa fase lo storico è ancora troppo corto per tutte le famiglie.';
  }
  return `Il confronto rapido è costruito prima su <strong>comparisonSnapshot</strong> e <strong>compareGroup</strong>, e solo in fallback sulla famiglia generica. In questo modo 5K e 10K, oppure progressioni di durata molto diversa, non vengono mescolati in modo improprio.`;
}

function renderMain() {
  const root = document.getElementById('mainContent');

  if (state.loading) {
    root.innerHTML = `<section class="card-panel loading-box"><h2 class="section-title mb-2">Caricamento archivio</h2><p class="muted mb-0">Lettura del JSON remoto in corso.</p></section>`;
    return;
  }

  if (state.error) {
    root.innerHTML = `<section class="card-panel error-box"><h2 class="section-title mb-2">Errore di caricamento</h2><p class="mb-0">${state.error}</p></section>`;
    return;
  }

  const report = state.archive?.reports?.[state.selectedDate];
  if (!report) {
    root.innerHTML = `<section class="card-panel p-4"><h2 class="section-title">Nessun report disponibile</h2><p class="muted mb-0">La data selezionata non contiene un report valido.</p></section>`;
    return;
  }

  const currentSummary = report.summaryCards?.[0];
  const easyGroup = pickBestComparableGroup('easy');
  const intervalsGroup = pickBestComparableGroup('intervals');
  const progressionGroup = pickBestComparableGroup('progression');
  const easySeries = groupToSeries(easyGroup);
  const intervalSeries = groupToSeries(intervalsGroup);
  const progressionSeries = groupToSeries(progressionGroup);
  const longSeries = collectSundayLongSeries(report);
  const weeklySeries = report.data?.weeklyVolume || [];
  const weightSeries = buildArchiveWeightSeries(state.selectedDate);

  root.innerHTML = `
    <section class="card-panel hero-card mb-4">
      <div class="row g-4 align-items-start">
        <div class="col-xl-7">
          <div class="eyebrow mb-2">Report selezionato</div>
          <h1 class="section-title mb-2">${report.title}</h1>
          <p class="muted mb-3">${report.subtitle || ''}</p>
          ${buildLastWorkoutOverview(report)}
          <div class="d-flex flex-wrap gap-2 mt-3">
            ${(report.heroTags || []).slice(0, 6).map(tag => `<span class="delta-badge">${tag}</span>`).join('')}
          </div>
        </div>
        <div class="col-xl-5">
          <div class="d-grid gap-3">
            <div class="metric-item">
              <div class="label">Stato forma</div>
              <div class="value">${currentSummary?.value || 'n.d.'}</div>
              <div class="mini-note mt-2">${buildStateFormText(report)}</div>
            </div>
            <div class="metric-item">
              <div class="label">10K realistico e gare</div>
              <div class="value">${report.summaryCards?.find(c => c.label.toLowerCase().includes('10k'))?.value || 'n.d.'}</div>
              <div class="mini-note mt-2">${buildRaceForecastText(report)}</div>
            </div>
            <div class="metric-item">
              <div class="label">Peso e composizione</div>
              <div class="value">${latestWeight(report) != null ? latestWeight(report).toFixed(1) + ' kg' : 'n.d.'}</div>
              <div class="mini-note mt-2">${buildBodyCompText(report)}</div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section class="row g-4 mb-4">
      <div class="col-12">
        <div class="card-panel p-4 h-100">
          <div class="eyebrow mb-2">Sintesi tecnica</div>
          <h2 class="section-title mb-3">Relazione medico-sportiva e operativa</h2>
          ${buildTechnicalSummaryHTML(report)}
        </div>
      </div>
      <div class="col-12">
        ${buildNutritionHTML(report)}
      </div>
    </section>

    <section class="mb-4">
      <div class="d-flex justify-content-between align-items-end flex-wrap gap-2 mb-3">
        <div>
          <h2 class="section-title mb-1">Grafici chiave di tendenza</h2>
          <div class="muted">Ogni grafico esplicita ascissa, ordinata e criterio di normalizzazione del confronto.</div>
        </div>
      </div>
      <div class="row g-4">
        <div class="col-xl-6">
          <div class="card-panel chart-card">
            <h3>Easy run</h3>
            <div class="chart-sub">${buildAxisNote(easyGroup, 'passo medio normalizzato (sec/km)', 'Nessun gruppo easy omogeneo sufficiente.')}</div>
            <svg id="easyPaceChart" class="chart" aria-label="Trend easy"></svg>
          </div>
        </div>
        <div class="col-xl-6">
          <div class="card-panel chart-card">
            <h3>Ripetute / passo gara</h3>
            <div class="chart-sub">${buildAxisNote(intervalsGroup, 'passo medio del blocco comparabile (sec/km)', 'Nessun gruppo di ripetute omogenee sufficiente.')}</div>
            <svg id="intervalChart" class="chart" aria-label="Trend ripetute"></svg>
          </div>
        </div>
        <div class="col-xl-6">
          <div class="card-panel chart-card">
            <h3>Progressioni</h3>
            <div class="chart-sub">${buildAxisNote(progressionGroup, 'passo medio del blocco comparabile (sec/km)', 'Nessun gruppo di progressioni omogenee sufficiente.')}</div>
            <svg id="progressionChart" class="chart" aria-label="Trend progressioni"></svg>
          </div>
        </div>
        <div class="col-xl-6">
          <div class="card-panel chart-card">
            <h3>Lunghi domenicali</h3>
            <div class="chart-sub">Ascissa: data dei lunghi domenicali. Ordinata: passo medio della seduta. Confronto descrittivo, non pienamente normalizzato.</div>
            <svg id="longChart" class="chart" aria-label="Trend lunghi"></svg>
          </div>
        </div>
        <div class="col-xl-6">
          <div class="card-panel chart-card">
            <h3>Volume settimanale</h3>
            <div class="chart-sub">Ascissa: settimana di allenamento. Ordinata: chilometri settimanali.</div>
            <svg id="weeklyVolumeChart" class="chart" aria-label="Trend volume settimanale"></svg>
          </div>
        </div>
        <div class="col-xl-6">
          <div class="card-panel chart-card">
            <h3>Peso corporeo</h3>
            <div class="chart-sub">Ascissa: data del report. Ordinata: peso corporeo in kg. Qui conta il trend, non il singolo decimale.</div>
            <svg id="weightChart" class="chart" aria-label="Trend peso"></svg>
          </div>
        </div>
      </div>
    </section>

    <section class="row g-4">
      <div class="col-12">
        <div class="card-panel p-4 h-100">
          <div class="eyebrow mb-2">Confronto rapido</div>
          <h2 class="section-title mb-3">Prima vs ultima per gruppo comparabile</h2>
          <div class="table-responsive">
            <table class="table table-dark table-borderless table-tight align-middle mb-0">
              <thead>
                <tr>
                  <th>Gruppo</th>
                  <th>Normalizzazione</th>
                  <th>Prima data</th>
                  <th>Primo passo</th>
                  <th>Prima FC</th>
                  <th>Ultima data</th>
                  <th>Ultimo passo</th>
                  <th>Ultima FC</th>
                </tr>
              </thead>
              <tbody>${buildComparisonRows()}</tbody>
            </table>
          </div>
          <p class="small-note mt-3 mb-0">${buildComparisonComment()}</p>
        </div>
      </div>
    </section>`;

  renderChartOrNote('easyPaceChart', easySeries, 'line', { color: '#ff7a00', valueAccessor: d => d.paceSec, formatY: v => fmtPace(v).replace('/km', '') });
  renderChartOrNote('intervalChart', intervalSeries, 'line', { color: '#4ea6ff', valueAccessor: d => d.paceSec, formatY: v => fmtPace(v).replace('/km', '') });
  renderChartOrNote('progressionChart', progressionSeries, 'line', { color: '#32c48d', valueAccessor: d => d.paceSec, formatY: v => fmtPace(v).replace('/km', '') });
  renderChartOrNote('longChart', longSeries, 'line', { color: '#ffb020', valueAccessor: d => d.paceSec, formatY: v => fmtPace(v).replace('/km', '') });
  renderChartOrNote('weeklyVolumeChart', weeklySeries, 'bar', { color: '#4ea6ff', valueKey: 'km' });
  renderChartOrNote('weightChart', weightSeries, 'line', { color: '#a855f7', valueAccessor: d => d.weight, formatY: v => Number(v).toFixed(1) });
}

function renderAll() {
  ensureSelectedDateValid();
  renderSidebar('sidebarDesktop');
  renderSidebar('sidebarMobile');
  renderMain();
}

async function initApp() {
  try {
    state.loading = true;
    state.error = null;
    renderMain();

    state.archive = await loadArchive();
    state.selectedDate = readSelectedDateFromHash() || getReportDates().slice(-1)[0];

    ensureSelectedDateValid();
    state.loading = false;
    renderAll();
  } catch (err) {
    state.loading = false;
    state.error = err.message || 'Errore sconosciuto nel caricamento archivio.';
    renderAll();
  }
}

window.addEventListener('hashchange', () => {
  const next = readSelectedDateFromHash();
  if (next && state.archive?.reports?.[next]) {
    state.selectedDate = next;
    ensureSelectedDateValid();
    renderAll();
  }
});

initApp();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
