<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Running Report • Sintesi tecnica</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
:root {
  --bg: #08101f;
  --panel: #0f1930;
  --panel-2: #121f3f;
  --line: rgba(122, 146, 199, 0.18);
  --text: #ebf1ff;
  --muted: #9eadd1;
  --accent: #ff7a00;
  --accent-2: #4ea6ff;
  --good: #32c48d;
  --warn: #ffb020;
  --bad: #ff5d5d;
  --shadow: 0 18px 50px rgba(0,0,0,.24);
  --radius: 20px;
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  color: var(--text);
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background:
    radial-gradient(circle at top right, rgba(78,166,255,.12), transparent 24%),
    radial-gradient(circle at top left, rgba(255,122,0,.08), transparent 20%),
    var(--bg);
}
.app-shell { min-height: 100vh; overflow-x: clip; }
.row > * { min-width: 0; }
.card-panel {
  width: 100%;
  min-width: 0;
  overflow: hidden;
  background: linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.018));
  border: 1px solid var(--line);
  border-radius: var(--radius);
  box-shadow: var(--shadow);
}
.card.card-panel { background: linear-gradient(180deg, rgba(255,255,255,.035), rgba(255,255,255,.018)); }
.sidebar-wrap { width: 100%; min-width: 0; }
.sticky-lg-top { top: 1.2rem; }
.eyebrow {
  color: var(--accent);
  font-size: .76rem;
  font-weight: 800;
  letter-spacing: .14em;
  text-transform: uppercase;
}
.muted { color: var(--muted); }
.btn-soft {
  border-radius: 14px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.03);
  color: var(--text);
}
.btn-soft:hover { background: rgba(255,255,255,.06); color: var(--text); }
.btn-accent {
  background: rgba(255,122,0,.14);
  border-color: rgba(255,122,0,.28);
  color: #ffe7d2;
}
.btn-accent:hover { background: rgba(255,122,0,.20); color: #fff; }
.hero-card { padding: 1.4rem; }
.kpi-card { height: 100%; padding: 1rem 1rem 1.05rem; }
.kpi-label {
  color: var(--muted);
  font-size: .76rem;
  text-transform: uppercase;
  letter-spacing: .08em;
}
.kpi-value {
  font-size: clamp(1.55rem, 3.2vw, 2.2rem);
  font-weight: 800;
  line-height: 1.05;
  margin-top: .45rem;
}
.section-title {
  font-size: clamp(1.45rem, 2vw, 2rem);
  font-weight: 800;
}
.delta-badge {
  display: inline-flex;
  align-items: center;
  gap: .35rem;
  padding: .28rem .62rem;
  border-radius: 999px;
  font-size: .76rem;
  font-weight: 700;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.035);
  white-space: normal;
  max-width: 100%;
  text-align: left;
}
.delta-up { color: #ffc18c; }
.delta-down { color: #94d7ff; }
.delta-flat { color: #d7e2ff; }
.mini-note {
  font-size: .93rem;
  line-height: 1.55;
  color: var(--muted);
}
.metric-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: .85rem;
}
.metric-item {
  min-width: 0;
  padding: .9rem 1rem;
  border-radius: 16px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.025);
}
.metric-item .label { color: var(--muted); font-size: .78rem; text-transform: uppercase; letter-spacing: .08em; }
.metric-item .value { font-size: 1.45rem; font-weight: 800; margin-top: .35rem; }
.list-clean { margin: 0; padding-left: 1.15rem; }
.list-clean li { color: var(--muted); line-height: 1.7; margin-bottom: .35rem; }
.list-clean strong { color: var(--text); }
svg.chart {
  width: 100%;
  max-width: 100%;
  height: 280px;
  display: block;
  border-radius: 16px;
  background: linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,0));
}
.chart-card { min-width: 0; padding: 1rem; height: 100%; }
.chart-card h3 { font-size: 1.05rem; font-weight: 700; margin-bottom: .25rem; }
.chart-sub { color: var(--muted); font-size: .9rem; line-height: 1.5; margin-bottom: .75rem; }
.report-list button {
  width: 100%;
  text-align: left;
  padding: .9rem 1rem;
  border-radius: 16px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.02);
  color: var(--text);
}
.report-list button.active {
  border-color: rgba(255,122,0,.35);
  background: rgba(255,122,0,.08);
}
.report-list button + button { margin-top: .75rem; }
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: .4rem;
}
.calendar .wd {
  text-align: center;
  font-size: .72rem;
  color: var(--muted);
  padding: .2rem 0;
  text-transform: uppercase;
}
.calendar .day {
  min-height: 48px;
  border-radius: 14px;
  border: 1px solid transparent;
  background: rgba(255,255,255,.025);
  color: var(--text);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}
.calendar .day.has-report::after {
  content: '';
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  position: absolute;
  bottom: 7px;
  left: 50%;
  transform: translateX(-50%);
}
.calendar .day.selected {
  border-color: rgba(78,166,255,.55);
  box-shadow: inset 0 0 0 1px rgba(78,166,255,.28);
}
.calendar .day.other { opacity: .32; }
.zone-stack {
  display: flex;
  height: 14px;
  border-radius: 999px;
  overflow: hidden;
  background: rgba(255,255,255,.06);
}
.zone-legend {
  display: grid;
  grid-template-columns: repeat(2, minmax(0,1fr));
  gap: .55rem .8rem;
}
.zone-pill {
  display: flex;
  align-items: center;
  gap: .45rem;
  color: var(--muted);
  font-size: .9rem;
}
.zone-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex: 0 0 auto;
}
.table-tight td, .table-tight th {
  padding: .7rem .6rem;
  border-color: rgba(255,255,255,.06);
}
.table-tight th {
  color: var(--muted);
  font-size: .74rem;
  text-transform: uppercase;
  letter-spacing: .08em;
}
.small-note { color: var(--muted); font-size: .85rem; line-height: 1.55; }
.hero-card, .kpi-card, .offcanvas-body, .calendar, .zone-legend, .mini-note, .muted, .chart-sub, .section-title, .kpi-value, .metric-item .value { min-width: 0; overflow-wrap: anywhere; }
.table-responsive { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.btn-hamburger {
  padding: .5rem .65rem;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: rgba(255,255,255,.03);
}
.btn-hamburger:hover { background: rgba(255,255,255,.06); }
.btn-hamburger .navbar-toggler-icon {
  display: block;
  width: 1.35em;
  height: 1.35em;
  background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%28235, 241, 255, 0.88%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
}
@media (max-width: 991.98px) {
  .sidebar-wrap { position: static !important; }
}
@media (max-width: 767.98px) {
  .metric-grid { grid-template-columns: 1fr; }
  .zone-legend { grid-template-columns: 1fr; }
  .hero-card, .chart-card, .kpi-card, .metric-item { padding-left: .9rem; padding-right: .9rem; }
  .card-panel { border-radius: 18px; }
  svg.chart { height: 240px; }
}
</style>
</head>
<body>
<div class="app-shell py-3 py-lg-4">
  <div class="container-xxl">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <div class="eyebrow">Relazione tecnica sintetica</div>
        <div class="h2 fw-bold mb-0">Running report archive</div>
      </div>
      <div class="d-lg-none">
        <button class="navbar-toggler btn-hamburger" type="button" data-bs-toggle="offcanvas" data-bs-target="#archiveCanvas" aria-controls="archiveCanvas" aria-label="Apri archivio">
          <span class="navbar-toggler-icon"></span>
        </button>
      </div>
    </div>

    <div class="row g-4">
      <aside class="col-lg-4 col-xxl-3 d-none d-lg-block">
        <div class="sidebar-wrap sticky-lg-top">
          <div id="sidebarDesktop"></div>
        </div>
      </aside>

      <main class="col-lg-8 col-xxl-9">
        <div id="mainContent"></div>
      </main>
    </div>
  </div>
</div>

<div class="offcanvas offcanvas-start text-bg-dark" tabindex="-1" id="archiveCanvas" aria-labelledby="archiveCanvasLabel" style="background: var(--bg); width:min(92vw, 380px);">
  <div class="offcanvas-header border-bottom" style="border-color: var(--line)!important;">
    <h5 class="offcanvas-title" id="archiveCanvasLabel">Archivio report</h5>
    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
  </div>
  <div class="offcanvas-body p-3">
    <div id="sidebarMobile"></div>
  </div>
</div>

<input id="importFile" type="file" accept="application/json" hidden />

<script>
const BUNDLED_ARCHIVE = {"schemaVersion": 1, "athleteProfile": {"name": "Marco", "age": 33, "heightCm": 185, "weightKg": 87.3, "bodyFatPct": 23.1, "muscleMassKg": 63.3, "restingHr": 49, "maxHr": 190, "lthr": 168, "goals": {"10k": "< 59:50", "half": "< 1:59:00"}}, "reports": {"2026-03-17": {"title": "Report tecnico 10K • stato al 17 marzo 2026", "subtitle": "Aggiornamento del report con VO₂max, Training Readiness, Training Status, FC media/max 4 settimane e nuove zone cardio basate su SAFC 168 bpm.", "heroTags": ["Garmin Coach Greg • settimana 8/12", "3–4 uscite/settimana", "Target A-race: Tuttadritta 10 maggio", "Nuove zone corsa basate su SAFC 168 bpm"], "summaryCards": [{"label": "Stato forma", "value": "In crescita", "text": "Base aerobica, durata e passo facile sono migliorati in modo netto. La nuova evidenza chiave è la 5.01 km in 29:35."}, {"label": "Training Readiness", "value": "69/100", "text": "Moderato: sonno buono, recupero completato, HRV bilanciata. Il corpo appare fresco più che affaticato."}, {"label": "Training Status", "value": "Non produttivo", "text": "Non significa regressione: Garmin segnala che il carico è troppo sbilanciato sulle basse intensità rispetto al mix ideale."}, {"label": "10K realistico oggi", "value": "60:45–62:30", "text": "Il sub 60 è diventato molto più credibile. I 55' restano però una stima troppo aggressiva per maggio."}], "quickFacts": [["VO₂max", "51 attuale • lieve calo 51.5 → 51.0 → 50.6 in 4 settimane"], ["HRV Status", "69 ms • bilanciato"], ["Carico acuto", "157 • basso"], ["Sonno", "84 punteggio notte • media 7 giorni 6h31"], ["FC corsa (ultime 4 settimane)", "FC media 141 bpm • FC max media 159 bpm"], ["Zone corsa", "ricalcolate su SAFC 168 bpm"], ["PB funzionale 5K", "5.01 km in 29:35 il 7 marzo, molto più rappresentativo del vecchio 39:30"], ["Bilancia", "BMI 25.3 = sovrastima grossolana del rischio se letto da solo"]], "data": {"easyRuns": [{"date": "2026-01-28", "label": "28 gen", "paceSec": 523, "distance": 3.45}, {"date": "2026-01-31", "label": "31 gen", "paceSec": 471, "distance": 3.85}, {"date": "2026-02-01", "label": "1 feb", "paceSec": 457, "distance": 5.42}, {"date": "2026-02-04", "label": "4 feb", "paceSec": 475, "distance": 3.81}, {"date": "2026-02-06", "label": "6 feb", "paceSec": 478, "distance": 4.54}, {"date": "2026-02-11", "label": "11 feb", "paceSec": 403, "distance": 5.96}, {"date": "2026-02-15", "label": "15 feb", "paceSec": 445, "distance": 6.76}, {"date": "2026-02-18", "label": "18 feb", "paceSec": 440, "distance": 4.28}, {"date": "2026-02-19", "label": "19 feb", "paceSec": 446, "distance": 3.7}, {"date": "2026-02-20", "label": "20 feb", "paceSec": 494, "distance": 3.65}, {"date": "2026-02-23", "label": "23 feb", "paceSec": 458, "distance": 4.78}, {"date": "2026-03-01", "label": "1 mar", "paceSec": 444, "distance": 6.77}, {"date": "2026-03-03", "label": "3 mar", "paceSec": 441, "distance": 6.83}, {"date": "2026-03-13", "label": "13 mar", "paceSec": 408, "distance": 8.02}, {"date": "2026-03-15", "label": "15 mar", "paceSec": 415, "distance": 8.68}], "weeklyVolume": [{"label": "26 gen–1 feb", "km": 14.16}, {"label": "2–8 feb", "km": 12.48}, {"label": "9–15 feb", "km": 16.78}, {"label": "16–22 feb", "km": 11.63}, {"label": "23 feb–1 mar", "km": 23.86}, {"label": "2–8 mar", "km": 18.38}, {"label": "9–15 mar", "km": 30.04}], "vo2Trend": [{"date": "2026-02-23", "label": "23 feb", "value": 51.5}, {"date": "2026-03-02", "label": "2 mar", "value": 51.0}, {"date": "2026-03-09", "label": "9 mar", "value": 50.6}], "zoneBands": [{"label": "Z1 Recupero", "low": 109, "high": 133, "note": "65–79% SAFC"}, {"label": "Z2 Facile", "low": 134, "high": 148, "note": "80–88% SAFC"}, {"label": "Z3 Aerobica", "low": 150, "high": 158, "note": "89–94% SAFC"}, {"label": "Z4 Soglia", "low": 160, "high": 166, "note": "95–99% SAFC"}, {"label": "Z5 Sopra soglia", "low": 168, "high": 190, "note": "100–113% SAFC"}], "sessions": [{"name": "Prima corsa facile", "date": "28 gen", "distance": 3.45, "time": "30:03", "pace": "8:43/km", "paceSec": 523, "avgHr": 124, "maxHr": 132, "power": 237, "cadence": 156, "stride": 0.74, "te": "1.4 aerobico basso", "load": 14, "rpe": "Molto facile", "type": "easy"}, {"name": "5K di riferimento", "date": "7 mar", "distance": 5.01, "time": "29:35", "pace": "5:54/km", "paceSec": 354, "avgHr": 154, "maxHr": 176, "power": 334, "cadence": 176, "stride": 0.96, "te": "3.3 miglioramento aerobico", "load": 92, "rpe": "4/10 abbastanza duro", "type": "fast"}, {"name": "Ultima corsa facile", "date": "15 mar", "distance": 8.68, "time": "1:00:05", "pace": "6:55/km", "paceSec": 415, "avgHr": 137, "maxHr": 151, "power": 285, "cadence": 173, "stride": 0.84, "te": "2.8 mantenimento", "load": 54, "rpe": "2/10 leggero", "type": "easy"}], "bodyComp": {"weight": 86.7, "bmi": 25.3, "bodyFat": 22.8, "fatMass": 19.8, "muscleMass": 63.1, "skeletalMusclePct": 38.1, "visceralFat": 7, "waterPct": 59.1, "bmr": 1815, "ffm": 66.9}}, "sections": {"executive": "\n                <p>Con i dati nuovi il quadro cambia in meglio: il report precedente era prudente perché mancava un riferimento prestativo reale. La corsa del <strong>7 marzo da 5.01 km in 29:35</strong> sposta l’analisi. Non dimostra ancora che oggi hai già il sub 60 “in mano”, ma dimostra che il vecchio PB 5K da 39:30 non è più un benchmark utile.</p>\n                <p>Qui c’è il punto da mettere alla prova: raddoppiare una 5K a <strong>5:54/km</strong> non equivale automaticamente a tenere <strong>5:59/km</strong> per 10 km. Però ci dice che il target è entrato nella zona del plausibile. La differenza tra desiderio e dato si è ridotta parecchio.</p>\n                <div class=\"quote\">Conclusione aggiornata: il sub 60 non va più trattato come target “ottimistico”, ma come obiettivo realistico se nelle prossime settimane inserisci un po’ più di lavoro vicino alla soglia e proteggi il recupero.</div>\n                ", "physiology": "\n                <p><strong>Training Readiness 69</strong> con sonno 84, recupero completato, HRV 69 ms bilanciata e carico acuto basso significa una cosa abbastanza chiara: il tuo problema oggi non sembra essere la stanchezza sistemica. Semmai il contrario: sei abbastanza fresco, ma lo stimolo recente è stato un po’ troppo facile per far dire a Garmin che sei “produttivo”.</p>\n                <p>Il <strong>VO₂max sceso da 51.5 a 50.6</strong> nelle ultime 4 settimane va letto con cautela. È un calo piccolo, mentre sul campo hai migliorato passo, durata e benchmark 5K. Questo è un classico caso in cui l’algoritmo può reagire a combinazione di caldo, sedute facili, HR più alta in alcune giornate o finestra temporale breve. Non lo leggerei come peggioramento reale della forma.</p>\n                <p><strong>Training Status “Non produttivo”</strong> non è una bocciatura del piano: è un feedback sul mix. Garmin ti sta dicendo che il carico c’è, ma che è troppo concentrato in basso. Quindi la conclusione non è “stai sbagliando tutto”; la conclusione corretta è “per rendere il blocco più 10K-specifico serve un pizzico di intensità qualitativa in più”.</p>\n                ", "zones": "\n                <p>La correzione delle zone da <strong>% FC max</strong> a <strong>% SAFC/LTHR 168 bpm</strong> per te ha senso. Il tuo vecchio vincolo psicologico di stare sotto <strong>130 bpm</strong> per sentirti in Z2 probabilmente era troppo restrittivo rispetto a come realmente risponde il tuo corpo adesso.</p>\n                <p>Detto questo, non fare l’errore opposto. Il fatto che ora tu possa parlare o respirare col naso a ritmi un po’ più sostenuti <em>non</em> significa che ogni corsa a 145–150 bpm sia automaticamente “facile”. Le nuove zone sono più credibili, ma non sono un lasciapassare per trasformare ogni easy run in medio mascherato.</p>\n                <p>Il dato forte è che la tua <strong>ultima corsa facile a 137 bpm medi</strong> cade perfettamente dentro la nuova <strong>Z2 (134–148)</strong>. Questo rende il feeling della seduta coerente con il modello fisiologico aggiornato. È la prima volta che Garmin e la tua percezione soggettiva sembrano allinearsi davvero.</p>\n                ", "technique": "\n                <p>La tecnica sta migliorando senza che tu sembri averla “forzata”. Passi da <strong>156 spm e 0.74 m</strong> nella prima corsa facile a <strong>173 spm e 0.84 m</strong> nell’ultima facile, fino a <strong>176 spm e 0.96 m</strong> nel 5K veloce. Questo è il pattern sano: la meccanica migliora come effetto della forma, non come tentativo artificiale di inseguire un numero.</p>\n                <p>Il margine più utile non è rincorrere ancora più cadenza, ma consolidare la capacità di mantenere una buona lunghezza del passo quando il ritmo sale verso il passo gara 10K. La tua 5K mostra già che quando spingi, la gamba “si apre” meglio e la potenza sale parecchio. Ora manca soprattutto la tenuta metabolica, non il gesto di base.</p>\n                ", "estimates": "\n                <p><strong>Stima 10K oggi:</strong> 60:45–62:30. La corsa da 5.01 km in 29:35 suggerisce, con una normale penalità di fatica sul raddoppio distanza, una proiezione intorno ai 61 minuti e mezzo. Quindi sì: sei vicino. Ma vicino non significa già automatico.</p>\n                <p><strong>Stima 10K a maggio:</strong> 58:45–60:30 se continui con 3–4 uscite, una seduta di soglia a settimana e un medio/lungo facile che salga in modo stabile. Il vero rischio non è il motore: è arrivare in gara con troppo poco lavoro specifico a ritmo 10K.</p>\n                <p><strong>Stima mezza di ottobre:</strong> target sub 2h plausibile, ma solo se da maggio in poi sposti il focus su volume e lungo. Per stare sotto 2h ti serve meno brillantezza pura di oggi e più tenuta strutturale.</p>\n                ", "strategy": "\n                <p><strong>Io non butterei Garmin Greg.</strong> Lo terrei, ma correggerei il mix. In pratica: una seduta davvero facile, una seduta qualitativa alternando soglia e 10K   const [y,m,d] = iso.split('-').map(Number);
  return new Date(y, m - 1, d);
}

function formatLongDate(iso) {

  });

function fmtPace(sec) {
  if (sec == null || Number.isNaN(sec)) return 'n.d.';
  const m = Math.floor(sec / 60);
  const s = Math.round(sec % 60).toString().padStart(2, '0');
  return `${m}:${s}/km`;
}

function deltaInfo(current, previous, decimals = 1, suffix = '') {
  if (current == null) return { text: 'n.d.', cls: 'delta-flat' };
  if (previous == null) return { text: 'prima rilevazione', cls: 'delta-flat' };
  const diff = current - previous;
  if (Math.abs(diff) < 1e-9) return { text: 'stabile', cls: 'delta-flat' };
  const sign = diff > 0 ? '↑' : '↓';
  const cls = diff > 0 ? 'delta-up' : 'delta-down';
  return { text: `${sign} ${Math.abs(diff).toFixed(decimals)}${suffix}`, cls };
}

  data.forEach((d, i) => {
    const v = valueAccessor(d);
    if (v == null) return;
    path += `${path ? 'L' : 'M'} ${x(i)} ${y(v)} `;
  });
  svg.insertAdjacentHTML('beforeend', `<path d="${path}" fill="none" stroke="${opts.color || '#ff7a00'}" stroke-width="3.25" />`);

  data.forEach((d, i) => {
    const v = valueAccessor(d);
    if (v == null) return;
    svg.insertAdjacentHTML('beforeend', `<circle cx="${x(i)}" cy="${y(v)}" r="4.5" fill="${opts.color || '#ff7a00'}" />`);
  });
}

function barChart(svgId, data, valueKey, opts = {}) {
  const svg = document.getElementById(svgId);
  if (!svg || !data?.length) return;
  const { width, height } = createSVG(svg, opts.width || 900, opts.height || 280);
  const m = { top: 18, right: 18, bottom: 48, left: 48 };
  const innerW = width - m.left - m.right;
  const innerH = height - m.top - m.bottom;
  const maxVal = Math.max(...data.map(d => d[valueKey] || 0)) * 1.2 || 1;
  const step = innerW / data.length;
  const barW = step * 0.58;

  for (let i = 0; i < 5; i++) {
    const val = (maxVal / 4) * (4-i);
    const gy = m.top + (innerH / 4) * i;
    svg.insertAdjacentHTML('beforeend', `<line x1="${m.left}" y1="${gy}" x2="${width-m.right}" y2="${gy}" stroke="rgba(255,255,255,.08)" />`);
    svg.insertAdjacentHTML('beforeend', `<text x="${m.left-10}" y="${gy+4}" text-anchor="end" fill="rgba(235,241,255,.62)" font-size="12">${Math.round(val)}</text>`);
  }

  data.forEach((d, i) => {
    const x = m.left + (i + 0.5) * step - barW / 2;
    const h = ((d[valueKey] || 0) / maxVal) * innerH;
    const y = m.top + innerH - h;
    svg.insertAdjacentHTML('beforeend', `<rect x="${x}" y="${y}" width="${barW}" height="${h}" rx="8" fill="${opts.color || '#4ea6ff'}" />`);
    svg.insertAdjacentHTML('beforeend', `<text x="${x + barW/2}" y="${height-14}" text-anchor="middle" fill="rgba(235,241,255,.62)" font-size="12">${d.label}</text>`);
  });
}

function buildCalendarMarkup() {
  const reportDates = new Set(getReportDates());
  const first = new Date(state.monthCursor.getFullYear(), state.monthCursor.getMonth(), 1);
  const startOffset = (first.getDay() + 6) % 7;
  const gridStart = new Date(first);
  gridStart.setDate(first.getDate() - startOffset);
  let cells = '';
  const weekdays = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom']
    .map(d => `<div class="wd">${d}</div>`).join('');
  for (let i = 0; i < 42; i++) {
    const d = new Date(gridStart);
    d.setDate(gridStart.getDate() + i);
    const iso = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    const sameMonth = d.getMonth() === state.monthCursor.getMonth();
    const hasReport = reportDates.has(iso);
    const selected = iso === state.selectedDate;
    cells += `<button type="button" class="day ${sameMonth ? '' : 'other'} ${hasReport ? 'has-report' : ''} ${selected ? 'selected' : ''}" data-date="${iso}">${d.getDate()}</button>`;
  }
  return `
    <div class="d-flex align-items-center justify-content-between mb-3">
      <button class="btn btn-soft btn-sm" id="prevMonthBtn">‹</button>
      <div class="fw-semibold text-capitalize">${formatMonth(state.monthCursor)}</div>
      <button class="btn btn-soft btn-sm" id="nextMonthBtn">›</button>
    </div>
    <div class="calendar">${weekdays}${cells}</div>
  `;
}

function parseSessionDateLabel(label, fallbackYear = 2026) {
  if (!label) return null;
  const m = String(label).toLowerCase().match(/(\d{1,2})\s+([a-zà]+)/i);
  if (!m) return null;
  const months = { gen:0, feb:1, mar:2, apr:3, mag:4, giu:5, lug:6, ago:7, set:8, ott:9, nov:10, dic:11 };
  const monthKey = m[2].slice(0,3);
  if (!(monthKey in months)) return null;
  return new Date(fallbackYear, months[monthKey], Number(m[1]));
}

function sessionKey(s) {
  return [s?.name || '', s?.date || '', s?.distance || '', s?.pace || ''].join('|');
}

function inferSessionCategory(session) {
  const name = String(session?.name || '').toLowerCase();
  const type = String(session?.type || '').toLowerCase();
  if (type === 'intervals' || name.includes('ripet')) return 'intervals';
  if (name.includes('progress')) return 'progression';
  if (name.includes('gara') || name.includes('test') || name.includes('riferimento') || type === 'fast') return 'race';
  if (name.includes('lung') || name.includes('long')) return 'long';
  if (type === 'easy' || name.includes('facile')) return 'easy';
  return type || 'other';
}

function collectAllSessions(cutoffIso = state.selectedDate) {
  const seen = new Set();
  const out = [];
  const cutoff = cutoffIso ? isoToDate(cutoffIso) : null;
  if (cutoff) cutoff.setHours(23,59,59,999);

  getReportDates().forEach(reportIso => {
    if (cutoffIso && isoToDate(reportIso) > cutoff) return;
    const rep = state.archive.reports[reportIso];
    (rep?.data?.sessions || []).forEach(s => {
      const key = sessionKey(s);
      if (seen.has(key)) return;
      seen.add(key);
      const parsed = parseSessionDateLabel(s.date, isoToDate(reportIso).getFullYear()) || isoToDate(reportIso);
      if (cutoff && parsed > cutoff) return;
      out.push({ ...s, _parsedDate: parsed, _reportIso: reportIso, _category: inferSessionCategory(s) });
    });
  });

  return out.sort((a, b) => a._parsedDate - b._parsedDate);
}

function getCategorySessions(category, cutoffIso = state.selectedDate) {
  return collectAllSessions(cutoffIso).filter(s => s._category === category);
}

function collectSundayLongSeries(report) {
  return (report?.data?.easyRuns || [])
    .map(r => ({ ...r, _date: isoToDate(r.date) }))
    .filter(r => r._date.getDay() === 0)
    .sort((a, b) => a._date - b._date)
    .map(r => ({ ...r, label: r._date.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' }) }));
}

function buildSessionSeries(category, cutoffIso = state.selectedDate) {
  return getCategorySessions(category, cutoffIso).map(s => ({
    label: s._parsedDate.toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' }),
    paceSec: s.paceSec,
    distance: s.distance,
    avgHr: s.avgHr,
    date: s.date,
    name: s.name
  }));
}

function buildArchiveWeightSeries(cutoffIso = state.selectedDate) {
  const cutoff = cutoffIso ? isoToDate(cutoffIso) : null;
  if (cutoff) cutoff.setHours(23,59,59,999);
  return getReportDates()
    .filter(date => !cutoff || isoToDate(date) <= cutoff)
    .map(date => ({
      label: isoToDate(date).toLocaleDateString('it-IT', { day: '2-digit', month: '2-digit' }),
      date,
      weight: latestWeight(state.archive.reports[date]),
      bodyFat: latestBodyFat(state.archive.reports[date]),
      readiness: latestReadiness(state.archive.reports[date]),
      vo2: latestVo2(state.archive.reports[date])
    }))
    .filter(d => d.weight != null);
}

function findPreviousSameCategorySession(currentSession, cutoffIso = state.selectedDate) {
  if (!currentSession) return null;
  const category = inferSessionCategory(currentSession);
  const all = getCategorySessions(category, cutoffIso);
  if (!all.length) return null;
  const currentKey = sessionKey(currentSession);
  const idx = all.findIndex(s => sessionKey(s) === currentKey);
  if (idx > 0) return all[idx - 1];
  if (idx === -1 && all.length) {
    const before = all.filter(s => s._parsedDate < (parseSessionDateLabel(currentSession.date, isoToDate(cutoffIso).getFullYear()) || isoToDate(cutoffIso)));
    return before.length ? before[before.length - 1] : null;
  }
  return null;
}

function firstLast(arr) {
  return { first: arr?.length ? arr[0] : null, last: arr?.length ? arr[arr.length - 1] : null };
}

function sessionDeltaText(current, previous) {
  if (!current || !previous) return 'Nessun confronto omogeneo ancora disponibile.';
  const paceDiff = previous.paceSec != null && current.paceSec != null ? current.paceSec - previous.paceSec : null;
  const hrDiff = previous.avgHr != null && current.avgHr != null ? current.avgHr - previous.avgHr : null;
  let parts = [];
  if (paceDiff != null) {
    parts.push(paceDiff < 0 ? `passo medio più rapido di ${fmtPace(Math.abs(paceDiff)).replace('/km','')}` : `passo medio più lento di ${fmtPace(Math.abs(paceDiff)).replace('/km','')}`);
  }
  if (hrDiff != null) {
    parts.push(hrDiff < 0 ? `con ${Math.abs(hrDiff)} bpm in meno` : `con ${Math.abs(hrDiff)} bpm in più`);
  }
  return parts.length ? parts.join(', ') + '.' : 'Confronto disponibile ma non completo sui delta principali.';
}

function buildNutritionPlanData(report) {
  const body = report?.data?.bodyComp || {};
  const weight = body.weight ?? state.archive?.athleteProfile?.weightKg ?? 87.3;
  const proteinLow = Math.round(weight * 1.6);
  const proteinHigh = Math.round(weight * 1.8);
  const targetRange = computeTargetWeightRange(report);

  const start = isoToDate(state.selectedDate);
  const end = getComingSunday(start);

  const days = [];
  let cursor = new Date(start);

  while (cursor <= end) {
    const template = getNutritionTemplateByWeekday(cursor.getDay());
    const kcal = sumMealsKcal(template);

    days.push({
      label: formatShortDayDate(cursor),
      isToday: cursor.toDateString() === start.toDateString(),
      kcal,
      ...template
    });

    cursor = addDays(cursor, 1);
  }

  const avgTargetKcal = Math.round(
    days.reduce((sum, day) => sum + day.kcal, 0) / Math.max(days.length, 1)
  );

  return {
    proteinLow,
    proteinHigh,
    targetLow: targetRange.low,
    targetHigh: targetRange.high,
    avgTargetKcal,
    days
  };
}

function formatCompareCell(item, mode) {
  if (!item) return 'n.d.';
  if (mode === 'pace') return item.pace ? item.pace : (item.paceSec != null ? fmtPace(item.paceSec) : 'n.d.');
  if (mode === 'hr') return item.avgHr != null ? `${item.avgHr} bpm` : 'n.d.';
  if (mode === 'distance') return item.distance != null ? `${Number(item.distance).toFixed(2)} km` : 'n.d.';
  if (mode === 'date') return item.date || item.label || 'n.d.';
  return 'n.d.';
}

function buildComparisonRows(report) {
  const easySet = firstLast(getCategorySessions('easy', state.selectedDate));
  const intervalSet = firstLast(getCategorySessions('intervals', state.selectedDate));
  const longSet = firstLast(collectSundayLongSeries(report));
  const raceSet = firstLast(getCategorySessions('race', state.selectedDate));
  const rows = [
    { label: 'Corse facili', first: easySet.first, last: easySet.last },
    { label: 'Ripetute', first: intervalSet.first, last: intervalSet.last },
    { label: 'Lunghi domenicali', first: longSet.first, last: longSet.last },
    { label: 'Gare / test di riferimento', first: raceSet.first, last: raceSet.last }
  ];
  return rows.map(r => `
    <tr>
      <td><strong>${r.label}</strong></td>
      <td>${formatCompareCell(r.first, 'date')}</td>
      <td>${formatCompareCell(r.first, 'pace')}</td>
      <td>${formatCompareCell(r.first, 'hr')}</td>
      <td>${formatCompareCell(r.first, 'distance')}</td>
      <td>${formatCompareCell(r.last, 'date')}</td>
      <td>${formatCompareCell(r.last, 'pace')}</td>
      <td>${formatCompareCell(r.last, 'hr')}</td>
      <td>${formatCompareCell(r.last, 'distance')}</td>
    </tr>
  `).join('');
}

function buildComparisonComment(report) {
  const easy = firstLast(getCategorySessions('easy', state.selectedDate));
  const race = firstLast(getCategorySessions('race', state.selectedDate));
  const longs = firstLast(collectSundayLongSeries(report));
  let parts = [];
  if (easy.first && easy.last) {
    parts.push(`sulle corse facili il salto è netto: da ${easy.first.pace} a ${easy.last.pace}` + (easy.first.avgHr != null && easy.last.avgHr != null ? `, con una lettura cardiaca che oggi appare molto più coerente` : ''));
  }
  if (longs.first && longs.last) {
    parts.push(`nei lunghi domenicali stai soprattutto costruendo tenuta, passando da ${fmtPace(longs.first.paceSec)} a ${fmtPace(longs.last.paceSec)} su distanze comunque crescenti`);
  }
  if (race.first && race.last && sessionKey(race.first) !== sessionKey(race.last)) {
    parts.push(`i riferimenti prestativi mostrano che il tuo benchmark gara è salito davvero, non solo a sensazione`);
  }
  if (!parts.length) {
    return `Il confronto rapido è già utile per le corse facili, ma per ripetute, progressioni e gare hai ancora bisogno di uno storico un po’ più pieno nel JSON per far emergere un confronto davvero robusto.`;
  }
  return `Il quadro d’insieme dice che ${parts.join('; ')}. In sintesi: la crescita più evidente è sulla base aerobica e sulla tenuta, mentre la prossima area da rendere più chiara nei dati è la specificità 10K.`;
}

function renderChartOrNote(svgId, series, type, opts = {}) {
  const svg = document.getElementById(svgId);
  if (!svg) return;
  if (!series || series.length < 2) {
    svg.outerHTML = `<div class="small-note pt-2">Dati non ancora sufficienti per un confronto nel tempo di questa tipologia.</div>`;
    return;
  }
  if (type === 'bar') barChart(svgId, series, opts.valueKey, opts);
  else lineChart(svgId, series, opts.valueAccessor, opts);
}

function exportArchive() {

  a.download = 'marco-running-report-archive.json';
  a.click();
  URL.revokeObjectURL(a.href);
}

  state.selectedDate = getReportDates().slice(-1)[0];
  saveSelectedDate();
  state.monthCursor = new Date(isoToDate(state.selectedDate).getFullYear(), isoToDate(state.selectedDate).getMonth(), 1);
  renderAll();
}

document.getElementById('importFile').addEventListener('change', async (e) => {
  const file = e.target.files?.[0];
  if (!file) return;
  try {
    const text = await file.text();
    const parsed = JSON.parse(text);
    if (!parsed.reports) throw new Error('Formato non valido: manca la chiave reports');
    state.archive = parsed;
    saveArchive();
    state.selectedDate = getReportDates().slice(-1)[0];
    saveSelectedDate();
    state.monthCursor = new Date(isoToDate(state.selectedDate).getFullYear(), isoToDate(state.selectedDate).getMonth(), 1);
    renderAll();
    alert('Archivio importato correttamente.');
  } catch (err) {
    alert('Import fallito: ' + err.message);
  } finally {
    e.target.value = '';
  }
});

function renderAll() {
  ensureSelectedDateValid();
  renderSidebar('sidebarDesktop');
  renderSidebar('sidebarMobile');
  renderMain();
}

renderAll();
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
